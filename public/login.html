<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FiscoBot Pro 5.0 — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a14;--bg2:#070f1e;--bg3:#0a1628;
  --panel:rgba(9,17,32,.97);--panel2:rgba(11,22,40,.98);
  --b0:rgba(120,160,220,.07);--b1:rgba(120,160,220,.13);--b2:rgba(120,160,220,.22);
  --bgold:rgba(201,168,76,.3);
  --gold:#c9a84c;--gold2:#e2c46a;--golddim:rgba(201,168,76,.1);
  --green:#2dd4aa;--greend:rgba(45,212,170,.1);--greenbr:rgba(45,212,170,.25);
  --red:#ff6b8a;--redd:rgba(255,107,138,.12);--redbr:rgba(255,107,138,.3);
  --t1:#ecf2ff;--t2:#8aa4cc;--t3:#4a6080;--t4:#2a3a55;
  --ff:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--ff);overflow:hidden}

.bg-wrap{position:fixed;inset:0;z-index:0}
.bg-wrap::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(201,168,76,.12),transparent 55%),
    radial-gradient(ellipse 50% 50% at 10% 80%,rgba(91,164,245,.07),transparent 55%),
    radial-gradient(ellipse 40% 40% at 90% 70%,rgba(45,212,170,.05),transparent 50%);
}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(201,168,76,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,168,76,.025) 1px,transparent 1px);
  background-size:52px 52px;animation:gridShift 20s linear infinite;
}
@keyframes gridShift{to{background-position:52px 52px}}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:pfl var(--dur) var(--del) ease-in-out infinite}
@keyframes pfl{0%,100%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:var(--op);transform:translateY(-30px) scale(1)}80%{opacity:var(--op);transform:translateY(-100px) scale(.7)}}

.center{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}

/* Logo */
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px;animation:fadeUp .6s cubic-bezier(.34,1.2,.64,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
.logo-ico{width:72px;height:72px;border-radius:20px;position:relative;transform-style:preserve-3d;animation:logoFloat 4s ease-in-out infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotateX(8deg) rotateZ(-1deg)}50%{transform:translateY(-8px) rotateX(10deg) rotateZ(-1.5deg)}}
.logo-ico:hover{animation:none;transform:translateY(-12px) rotateX(5deg) scale(1.06)}
.logo-face{
  width:100%;height:100%;border-radius:20px;
  background:linear-gradient(150deg,#fff0a0 0%,#e8c44a 22%,#c9a84c 48%,#9a7020 72%,#6e4808 100%);
  display:flex;align-items:center;justify-content:center;font-size:30px;
  position:relative;overflow:hidden;
  box-shadow:0 2px 0 rgba(255,255,255,.28) inset,0 -2px 0 rgba(0,0,0,.38) inset,0 8px 0 #4a2e02,0 10px 4px rgba(0,0,0,.45),0 18px 40px rgba(201,168,76,.45);
}
.logo-face::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(155deg,rgba(255,255,255,.38) 0%,rgba(255,255,255,.08) 32%,transparent 55%,rgba(0,0,0,.18) 100%)}
.logo-face::after{content:'';position:absolute;top:2px;left:14%;right:14%;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);border-radius:99px}
.logo-text{font-size:26px;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#fff 20%,var(--gold2) 55%,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;font-family:var(--fm)}

/* Card */
.card{
  width:400px;max-width:100%;background:var(--panel);border:1px solid var(--b1);border-radius:20px;
  padding:36px 32px;box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);
  animation:cardIn .5s .1s cubic-bezier(.34,1.2,.64,1) both;position:relative;overflow:hidden;
}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.5) 40%,rgba(91,164,245,.3) 70%,transparent)}

.card-title{font-size:18px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.card-sub{font-size:11.5px;color:var(--t3);font-family:var(--fm);margin-bottom:28px}

/* Field */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:10.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;font-family:var(--fm)}
.inp-wrap{position:relative}
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--b1);border-radius:10px;padding:11px 38px 11px 14px;color:var(--t1);font-size:13px;font-family:var(--fm);outline:none;transition:all .2s}
.inp:focus{border-color:var(--bgold);background:rgba(201,168,76,.04);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.inp::placeholder{color:var(--t4)}
.inp.error{border-color:var(--redbr);background:var(--redd)}
.inp-ico{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--t4);font-size:14px;cursor:pointer;transition:color .15s;user-select:none}
.inp-ico:hover{color:var(--t2)}

/* Error */
.error-msg{display:none;align-items:center;gap:7px;background:var(--redd);border:1px solid var(--redbr);border-radius:9px;padding:9px 12px;margin-bottom:14px;font-size:11.5px;color:var(--red);font-family:var(--fm);animation:shake .35s ease}
.error-msg.show{display:flex}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

/* Row opts */
.row-opts{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.check-wrap{display:flex;align-items:center;gap:7px;cursor:pointer}
.check-wrap input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold);cursor:pointer}
.check-wrap span{font-size:11.5px;color:var(--t3);font-family:var(--fm)}
.link-forgot{font-size:11.5px;color:var(--gold);font-family:var(--fm);background:none;border:none;cursor:pointer;transition:opacity .15s;padding:0}
.link-forgot:hover{opacity:.7;text-decoration:underline}

/* Btn */
.btn-login{
  width:100%;padding:13px;border:none;border-radius:10px;cursor:pointer;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  color:#05100a;font-size:14px;font-weight:800;font-family:var(--ff);
  transition:all .25s cubic-bezier(.34,1.4,.64,1);margin-top:6px;
  position:relative;overflow:hidden;letter-spacing:-.2px;
}
.btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(155deg,rgba(255,255,255,.3) 0%,transparent 55%)}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.45),0 0 0 1px rgba(255,240,120,.2)}
.btn-login:active{transform:translateY(0);transition-duration:.1s}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-login.loading::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 1s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* Divider + footer */
.divider{display:flex;align-items:center;gap:10px;margin:20px 0 16px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b0)}
.divider span{font-size:10px;color:var(--t4);font-family:var(--fm);letter-spacing:1px}
.card-footer{text-align:center;margin-top:20px;padding-top:18px;border-top:1px solid var(--b0);font-size:10.5px;color:var(--t4);font-family:var(--fm)}
.card-footer span{color:var(--gold)}

/* Toast */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--panel2);border:1px solid var(--greenbr);border-radius:99px;padding:8px 20px;font-size:12px;color:var(--green);opacity:0;pointer-events:none;transition:all .3s;z-index:999;font-family:var(--fm)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="bg-grid"></div>
  <div id="particles"></div>
</div>

<div class="center">
  <div class="logo-wrap">
    <div class="logo-ico"><div class="logo-face">⚡</div></div>
    <div class="logo-text">FiscoBot Pro</div>
    <div class="logo-sub">Automação Fiscal · v5.0</div>
  </div>

  <div class="card">
    <div class="card-title">Acesse sua conta</div>
    <div class="card-sub">Entre com suas credenciais para continuar</div>

    <div class="error-msg" id="errorMsg">
      <span>⚠</span><span id="errorText">Email ou senha incorretos.</span>
    </div>

    <div class="field">
      <label>Email</label>
      <div class="inp-wrap">
        <input class="inp" id="inpEmail" type="email" placeholder="seu@email.com.br" autocomplete="email">
      </div>
    </div>

    <div class="field">
      <label>Senha</label>
      <div class="inp-wrap">
        <input class="inp" id="inpSenha" type="password" placeholder="••••••••" autocomplete="current-password">
        <span class="inp-ico" id="toggleSenha" title="Mostrar/ocultar senha">👁</span>
      </div>
    </div>

    <div class="row-opts">
      <label class="check-wrap">
        <input type="checkbox" id="chkLembrar" checked>
        <span>Lembrar acesso</span>
      </label>
      <button class="link-forgot" onclick="esqueceuSenha()">Esqueci a senha</button>
    </div>

    <button class="btn-login" id="btnEntrar" onclick="tentarLogin()">Entrar no FiscoBot</button>

    <div class="divider"><span>ACESSO SEGURO LOCAL</span></div>

    <div class="card-footer">
      FiscoBot Pro <span>v5.0.0</span> · Dados armazenados localmente<br>
      Conexão direta — sem servidores externos
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Toggle senha ──
document.getElementById('toggleSenha').addEventListener('click', () => {
  const inp = document.getElementById('inpSenha');
  const ico = document.getElementById('toggleSenha');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.textContent = inp.type === 'password' ? '👁' : '🙈';
});

// ── Helpers ──
function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorMsg').classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  if (color) t.style.color = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Login ──
async function tentarLogin() {
  const email = document.getElementById('inpEmail').value.trim().toLowerCase();
  const senha = document.getElementById('inpSenha').value;
  const btn   = document.getElementById('btnEntrar');

  hideError();
  document.querySelectorAll('.inp').forEach(i => i.classList.remove('error'));

  if (!email) {
    document.getElementById('inpEmail').classList.add('error');
    showError('Informe o email.');
    return;
  }
  if (!senha) {
    document.getElementById('inpSenha').classList.add('error');
    showError('Informe a senha.');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = 'Verificando...';

  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha }),
    });
    const data = await res.json();

    if (data.ok) {
      // Salva token de sessão
      sessionStorage.setItem('fb_token', data.token);
      sessionStorage.setItem('fb_user',  JSON.stringify(data.user));
      if (document.getElementById('chkLembrar').checked) {
        localStorage.setItem('fb_token', data.token);
        localStorage.setItem('fb_user',  JSON.stringify(data.user));
      }
      // Redireciona para o app principal
      window.location.href = '/';
    } else {
      showError(data.error || 'Email ou senha incorretos.');
      document.getElementById('inpEmail').classList.add('error');
      document.getElementById('inpSenha').classList.add('error');
      document.getElementById('inpSenha').value = '';
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = 'Entrar no FiscoBot';
    }
  } catch (err) {
    showError('Erro de conexão com o servidor.');
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = 'Entrar no FiscoBot';
  }
}

function esqueceuSenha() {
  showToast('💬 Entre em contato com o administrador do sistema.', '#c9a84c');
}

// ── Enter para logar ──
document.addEventListener('keydown', e => { if (e.key === 'Enter') tentarLogin(); });

// ── Se já tem sessão válida, vai direto ──
const savedToken = sessionStorage.getItem('fb_token') || localStorage.getItem('fb_token');
if (savedToken) {
  fetch('/api/auth/check', { headers: { 'x-fb-token': savedToken } })
    .then(r => r.json())
    .then(d => { if (d.ok) window.location.href = '/'; })
    .catch(() => {});
}

// ── Partículas ──
const pc = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div'); p.className = 'particle';
  const sz = Math.random()*3+1;
  p.style.cssText = `width:${sz}px;height:${sz}px;left:${10+Math.random()*80}%;bottom:${5+Math.random()*30}%;background:rgba(${Math.random()>.5?'201,168,76':'45,212,170'},${.3+Math.random()*.4});--dur:${3+Math.random()*5}s;--del:${Math.random()*8}s;--op:${.2+Math.random()*.4};`;
  pc.appendChild(p);
}

document.getElementById('inpEmail').focus();
</script>
</body>
</html>
